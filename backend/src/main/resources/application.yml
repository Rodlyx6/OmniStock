server:
  port: 8004
  servlet:
    context-path: /api

spring:
  application:
    name: backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/omnistock?useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&allowMultiQueries=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 88888888
  data:
    redis:
      host: localhost
      port: 6379
      password: 123321
      timeout: 10000
      database: 1
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
